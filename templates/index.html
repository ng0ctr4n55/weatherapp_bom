<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fraser Rise Weather</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f0f4f8; color: #2d3748; min-height: 100vh; }
    header { background: #2b6cb0; color: white; padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    .meta { font-size: 0.85rem; opacity: 0.85; }
    #refresh-btn { background: white; color: #2b6cb0; border: none; padding: 0.5rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    #refresh-btn:hover { background: #ebf8ff; }
    #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    #status { text-align: center; padding: 2rem; color: #718096; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
    .card { background: white; border-radius: 12px; padding: 1.2rem 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 0.4rem; }
    .card.today { border: 2px solid #2b6cb0; }
    .day { font-weight: 700; font-size: 0.95rem; color: #2b6cb0; }
    .date { font-size: 0.75rem; color: #718096; }
    .condition { font-size: 0.85rem; color: #4a5568; margin-top: 0.3rem; }
    .temps { font-size: 1.1rem; font-weight: 600; margin-top: 0.3rem; }
    .temp-max { color: #e53e3e; }
    .temp-sep { color: #cbd5e0; }
    .temp-min { color: #4299e1; }
    .rain { font-size: 0.8rem; color: #2f855a; margin-top: 0.2rem; }
    .fire { font-size: 0.75rem; color: #c05621; margin-top: 0.2rem; }
    .weather-icon { display: flex; align-items: center; justify-content: center; height: 56px; margin: 0.4rem 0; }
    .weather-icon svg { overflow: visible; }
    /* sun ray spin */
    @keyframes spin-rays { to { transform: rotate(360deg); } }
    .sun-rays { transform-box: fill-box; transform-origin: center; animation: spin-rays 10s linear infinite; }
    /* cloud drift */
    @keyframes drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(2px)} }
    .cloud-drift { animation: drift 3.5s ease-in-out infinite; }
    /* rain drop fall */
    @keyframes drop-fall { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(10px);opacity:0} }
    .drop-1 { animation: drop-fall 1s ease-in infinite; }
    .drop-2 { animation: drop-fall 1s ease-in 0.3s infinite; }
    .drop-3 { animation: drop-fall 1s ease-in 0.6s infinite; }
    /* lightning flash */
    @keyframes bolt-flash { 0%,85%,100%{opacity:1} 90%{opacity:0.05} }
    .lightning-bolt { animation: bolt-flash 2.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <!-- Hidden SVG symbol library -->
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-sunny" viewBox="0 0 52 52">
      <g class="sun-rays" style="transform-origin:26px 26px">
        <line x1="26" y1="3"  x2="26" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="26" y1="3"  x2="26" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" transform="rotate(45 26 26)"/>
        <line x1="26" y1="3"  x2="26" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" transform="rotate(90 26 26)"/>
        <line x1="26" y1="3"  x2="26" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" transform="rotate(135 26 26)"/>
        <line x1="26" y1="3"  x2="26" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" transform="rotate(180 26 26)"/>
        <line x1="26" y1="3"  x2="26" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" transform="rotate(225 26 26)"/>
        <line x1="26" y1="3"  x2="26" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" transform="rotate(270 26 26)"/>
        <line x1="26" y1="3"  x2="26" y2="10" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" transform="rotate(315 26 26)"/>
      </g>
      <circle cx="26" cy="26" r="10" fill="#fbbf24"/>
    </symbol>
    <symbol id="icon-partly-sunny" viewBox="0 0 52 52">
      <g class="sun-rays" style="transform-origin:18px 18px">
        <line x1="18" y1="3" x2="18" y2="8" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="3" x2="18" y2="8" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" transform="rotate(45 18 18)"/>
        <line x1="18" y1="3" x2="18" y2="8" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" transform="rotate(90 18 18)"/>
        <line x1="18" y1="3" x2="18" y2="8" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" transform="rotate(135 18 18)"/>
        <line x1="18" y1="3" x2="18" y2="8" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" transform="rotate(180 18 18)"/>
        <line x1="18" y1="3" x2="18" y2="8" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" transform="rotate(225 18 18)"/>
        <line x1="18" y1="3" x2="18" y2="8" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" transform="rotate(270 18 18)"/>
        <line x1="18" y1="3" x2="18" y2="8" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" transform="rotate(315 18 18)"/>
      </g>
      <circle cx="18" cy="18" r="7" fill="#fbbf24"/>
      <g class="cloud-drift">
        <rect x="10" y="28" width="36" height="15" rx="7.5" fill="#90a4ae"/>
        <circle cx="20" cy="28" r="9" fill="#90a4ae"/>
        <circle cx="34" cy="26" r="11" fill="#b0bec5"/>
      </g>
    </symbol>
    <symbol id="icon-cloudy" viewBox="0 0 52 52">
      <g class="cloud-drift">
        <rect x="4" y="14" width="44" height="20" rx="10" fill="#90a4ae"/>
        <circle cx="17" cy="14" r="12" fill="#90a4ae"/>
        <circle cx="36" cy="11" r="15" fill="#b0bec5"/>
      </g>
    </symbol>
    <symbol id="icon-rain" viewBox="0 0 52 52">
      <g class="cloud-drift">
        <rect x="4" y="10" width="44" height="18" rx="9" fill="#78909c"/>
        <circle cx="16" cy="10" r="10" fill="#78909c"/>
        <circle cx="34" cy="7"  r="13" fill="#90a4ae"/>
      </g>
      <line class="drop-1" x1="16" y1="34" x2="13" y2="46" stroke="#42a5f5" stroke-width="2.5" stroke-linecap="round"/>
      <line class="drop-2" x1="26" y1="34" x2="23" y2="46" stroke="#42a5f5" stroke-width="2.5" stroke-linecap="round"/>
      <line class="drop-3" x1="36" y1="34" x2="33" y2="46" stroke="#42a5f5" stroke-width="2.5" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-storm" viewBox="0 0 52 52">
      <g class="cloud-drift">
        <rect x="4" y="12" width="44" height="18" rx="9" fill="#64748b"/>
        <circle cx="16" cy="12" r="10" fill="#64748b"/>
        <circle cx="33" cy="9"  r="13" fill="#78909c"/>
      </g>
      <polygon class="lightning-bolt" points="29,30 21,43 27,43 23,52 34,38 27,38 32,30" fill="#fbbf24"/>
      <line class="drop-1" x1="13" y1="35" x2="10" y2="45" stroke="#90caf9" stroke-width="2" stroke-linecap="round"/>
      <line class="drop-3" x1="41" y1="35" x2="38" y2="45" stroke="#90caf9" stroke-width="2" stroke-linecap="round"/>
    </symbol>
  </svg>

  <header>
    <div>
      <h1>Fraser Rise, VIC — 7-Day Forecast</h1>
      <div class="meta" id="last-updated">Loading...</div>
    </div>
    <button id="refresh-btn">Refresh Now</button>
  </header>
  <main>
    <div id="status">Fetching forecast...</div>
    <div class="grid" id="cards" hidden></div>
  </main>

  <script>
    const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    const SVG_NS = "http://www.w3.org/2000/svg";

    function weatherIconId(descriptor) {
      const d = (descriptor || '').toLowerCase();
      if (d.includes('thunder') || d.includes('storm')) return 'icon-storm';
      if (d.includes('rain') || d.includes('shower'))   return 'icon-rain';
      if (d.includes('cloudy') && !d.includes('mostly') && !d.includes('partly')) return 'icon-cloudy';
      if (d.includes('mostly_sunny') || d.includes('mostly sunny') || d.includes('partly')) return 'icon-partly-sunny';
      return 'icon-sunny';
    }

    function makeWeatherIcon(descriptor) {
      const svg = document.createElementNS(SVG_NS, 'svg');
      svg.setAttribute('width', '52');
      svg.setAttribute('height', '52');
      const use = document.createElementNS(SVG_NS, 'use');
      use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#' + weatherIconId(descriptor));
      svg.appendChild(use);
      return svg;
    }

    function el(tag, cls) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      return e;
    }

    function txt(tag, cls, text) {
      const e = el(tag, cls);
      e.textContent = text;
      return e;
    }

    function buildCard(day, isToday) {
      const d = new Date(day.date);
      const card = el("div", "card" + (isToday ? " today" : ""));

      card.appendChild(txt("div", "day", DAYS[d.getUTCDay()]));
      card.appendChild(txt("div", "date", d.getUTCDate() + " " + MONTHS[d.getUTCMonth()]));

      const iconWrap = el("div", "weather-icon");
      iconWrap.appendChild(makeWeatherIcon(day.icon_descriptor));
      card.appendChild(iconWrap);

      card.appendChild(txt("div", "condition", day.short_text || ""));

      const temps = el("div", "temps");
      temps.appendChild(txt("span", "temp-max", (day.temp_max ?? "--") + "\u00b0"));
      temps.appendChild(txt("span", "temp-sep", " / "));
      temps.appendChild(txt("span", "temp-min", (day.temp_min ?? "--") + "\u00b0"));
      card.appendChild(temps);

      const chance = day.rain?.chance ?? 0;
      let rainText = "No rain expected";
      if (chance > 0) {
        rainText = chance + "% chance";
        const rMin = day.rain?.amount?.min;
        const rMax = day.rain?.amount?.max;
        if (rMin != null && rMax != null) rainText += ", " + rMin + "\u2013" + rMax + " mm";
      }
      card.appendChild(txt("div", "rain", rainText));

      if (day.fire_danger) {
        card.appendChild(txt("div", "fire", "Fire: " + day.fire_danger));
      }

      return card;
    }

    function renderCards(payload) {
      const grid = document.getElementById("cards");
      grid.textContent = "";
      payload.data.forEach((day, i) => grid.appendChild(buildCard(day, i === 0)));
      document.getElementById("last-updated").textContent =
        "Last updated: " + new Date(payload.fetched_at).toLocaleString();
      document.getElementById("status").hidden = true;
      grid.hidden = false;
    }

    function showError(msg) {
      const status = document.getElementById("status");
      status.textContent = msg;
      status.hidden = false;
      document.getElementById("cards").hidden = true;
    }

    async function loadForecast() {
      const res = await fetch("/api/forecast").catch(e => { showError("Network error: " + e.message); return null; });
      if (!res) return;
      if (res.status === 503) { showError("Fetching forecast from BOM \u2014 please wait a moment and refresh."); return; }
      if (!res.ok) { showError("Failed to load forecast."); return; }
      const data = await res.json().catch(() => null);
      if (!data) { showError("Invalid response from server."); return; }
      renderCards(data);
    }

    async function doRefresh() {
      const btn = document.getElementById("refresh-btn");
      btn.disabled = true;
      btn.textContent = "Refreshing...";
      document.getElementById("status").textContent = "Fetching latest forecast...";
      document.getElementById("status").hidden = false;
      document.getElementById("cards").hidden = true;

      const res = await fetch("/api/refresh", { method: "POST" }).catch(e => { showError("Refresh error: " + e.message); return null; });
      btn.disabled = false;
      btn.textContent = "Refresh Now";
      if (!res) return;
      if (!res.ok) { showError("Refresh failed."); return; }
      const data = await res.json().catch(() => null);
      if (!data) { showError("Invalid response from server."); return; }
      renderCards(data);
      if (data.refresh_failed) {
        document.getElementById("last-updated").textContent += " (live refresh failed — showing cached data)";
      }
    }

    document.getElementById("refresh-btn").addEventListener("click", doRefresh);
    loadForecast();
  </script>
</body>
</html>
